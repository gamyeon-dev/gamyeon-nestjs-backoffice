name: Backoffice CI/CD

on:
  push:
    branches: [ "dev" ] # 배포 대상 브랜치

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Docker Hub 로그인
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 2. Docker 이미지 빌드 및 푸시
      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ vars.DOCKERHUB_USERNAME }}/gamyeon-backoffice:latest .
          docker push ${{ vars.DOCKERHUB_USERNAME }}/gamyeon-backoffice:latest

      # 3. EC2 접속 및 배포 실행
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p /home/ec2-user/backoffice

            cd /home/ec2-user/backoffice

            # 1. GitHub Secrets 값으로 .env 파일 생성 (덮어쓰기)
            echo "PORT=3000" > .env
            echo "ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}" >> .env
            echo "ADMIN_PASSWORD_HASH=${{ secrets.ADMIN_PASSWORD_HASH }}" >> .env
            echo "JWT_SECRET=${{ secrets.BACKOFFICE_JWT_SECRET }}" >> .env
            echo "JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN }}" >> .env
            echo "DB_HOST=${{ secrets.DB_HOST }}" >> .env
            echo "DB_PORT=${{ secrets.DB_PORT }}" >> .env
            echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" >> .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            echo "DB_DATABASE=${{ secrets.DB_DATABASE }}" >> .env
            echo "DB_SSL=${{ secrets.DB_SSL }}" >> .env
            echo "DB_SSL_REJECT_UNAUTHORIZED=${{ secrets.DB_SSL_REJECT_UNAUTHORIZED }}" >> .env
            echo "DB_SYNCHRONIZE=false" >> .env
            echo "DB_LOGGING=false" >> .env
            echo "DB_MIGRATIONS_RUN=true" >> .env
            echo "S3_REGION=${{ secrets.BACKOFFICE_S3_REGION }}" >> .env
            echo "S3_BUCKET=${{ secrets.BACKOFFICE_S3_BUCKET }}" >> .env
            echo "S3_ACCESS_KEY_ID=${{ secrets.BACKOFFICE_S3_ACCESS_KEY_ID }}" >> .env
            echo "S3_SECRET_ACCESS_KEY=${{ secrets.BACKOFFICE_S3_SECRET_ACCESS_KEY }}" >> .env
            echo "FRONTEND_URL=${{ secrets.BACKOFFICE_FRONTEND_URL }}" >> .env
            echo "CONSUL_HOST=consul" >> .env
            echo "CONSUL_PORT=8500" >> .env
            echo "CONSUL_SERVICE_NAME=GAMYEON_BACKOFFICE_SERVER" >> .env
            echo "CONSUL_SERVICE_ADDRESS=backoffice-api" >> .env

            # 2. docker-compose.yml 생성
            cat > docker-compose.yml << 'EOF'
            services:
              backoffice-api:
                image: ${{ vars.DOCKERHUB_USERNAME }}/gamyeon-backoffice:latest
                container_name: backoffice-api
                env_file:
                  - .env
                ports:
                  - "3000:3000"
                restart: unless-stopped
                networks:
                  - gamyeon-net
            networks:
              gamyeon-net:
                external: true
            EOF

            # 3. 최신 이미지 풀 & 컨테이너 재시작
            docker pull ${{ vars.DOCKERHUB_USERNAME }}/gamyeon-backoffice:latest
            docker-compose up -d --no-deps backoffice-api
